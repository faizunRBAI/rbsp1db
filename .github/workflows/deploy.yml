name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Detect build tool and run tests
        run: |
          if [ -f "mvnw" ]; then
            chmod +x mvnw
            ./mvnw test -B
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew test
          else
            echo "No recognized build tool found (mvnw/gradlew)" && exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      jar_name: ${{ steps.find_jar.outputs.jar_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build JAR
        run: |
          if [ -f "mvnw" ]; then
            chmod +x mvnw
            ./mvnw package -DskipTests -B
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew bootJar -x test
          else
            echo "No recognized build tool found (mvnw/gradlew)" && exit 1
          fi

      - name: Find built JAR
        id: find_jar
        run: |
          if [ -f "mvnw" ]; then
            JAR=$(find target -maxdepth 1 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
          else
            JAR=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*plain*" | head -1)
          fi
          echo "Found JAR: $JAR"
          echo "jar_name=$JAR" >> "$GITHUB_OUTPUT"
          mkdir -p ansible/jar
          cp "$JAR" ansible/jar/app.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ansible/jar/app.jar
          retention-days: 1

  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [build]
    outputs:
      instance_ip: ${{ steps.tf_output.outputs.instance_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}"

      - name: Capture Terraform output
        id: tf_output
        working-directory: terraform
        run: |
          IP=$(terraform output -raw instance_public_ip)
          echo "instance_ip=$IP" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ansible/jar

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible python3-pip
          pip3 install --quiet PyMySQL

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSH to be available
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_ip }}"
          echo "Waiting for SSH on $SERVER_IP ..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/id_rsa ubuntu@"$SERVER_IP" "echo ok" 2>/dev/null; then
              echo "SSH is ready."
              break
            fi
            echo "Attempt $i/30 - not ready yet, sleeping 10s..."
            sleep 10
          done

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_ip }}"
          ansible-playbook ansible/playbook.yml \
            -i "$SERVER_IP," \
            -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            -e "db_name=appdb db_user=appuser db_password=${{ secrets.DB_PASSWORD }}"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get app URL from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test - verify app is responding
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Probing $APP_URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -Lsfo /dev/null -w "%{http_code}" "$APP_URL" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "App is healthy (HTTP $STATUS). Deploy verified."
              exit 0
            fi
            echo "Not ready yet, sleeping 15s..."
            sleep 15
          done
          echo "ERROR: App did not return a 2xx/3xx after all retries."
          exit 1
