---
- name: Configure Spring Boot application server
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    app_user: appuser
    app_group: appuser
    app_jar_src: "{{ playbook_dir }}/jar/app.jar"
    app_port: 8080
    db_name: appdb
    db_user: appuser
    db_password: "changeme"
    mysql_root_password: "rootchangeme"

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart spring-boot
      ansible.builtin.service:
        name: spring-boot
        state: restarted

  tasks:
    #  System prerequisites 
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - openjdk-17-jre-headless
          - nginx
          - python3-pymysql
          - curl
        state: present

    #  MySQL installation 
    - name: Install MySQL server
      ansible.builtin.apt:
        name: mysql-server
        state: present

    - name: Start and enable MySQL service
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: true

    - name: Wait for MySQL socket to be available
      ansible.builtin.wait_for:
        path: /var/run/mysqld/mysqld.sock
        timeout: 60

    - name: Wait for MySQL port 3306 to be listening
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 3306
        timeout: 60

    - name: Set MySQL root password
      community.mysql.mysql_user:
        name: root
        host: localhost
        password: "{{ mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock
        state: present
      ignore_errors: true

    - name: Create application database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
        login_host: localhost
        login_user: root
        login_password: "{{ mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create application database user
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        host: localhost
        state: present
        login_host: localhost
        login_user: root
        login_password: "{{ mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock

    #  Application user 
    - name: Create application system group
      ansible.builtin.group:
        name: "{{ app_group }}"
        system: true
        state: present

    - name: Create application system user
      ansible.builtin.user:
        name: "{{ app_user }}"
        group: "{{ app_group }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        state: present

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    #  Deploy JAR 
    - name: Copy application JAR to server
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/jar/app.jar"
        dest: "{{ app_dir }}/app.jar"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"
      notify: Restart spring-boot

    #  systemd unit 
    - name: Create Spring Boot systemd service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/spring-boot.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Spring Boot Application
          After=network.target mysqld.service mysql.service
          Requires=mysql.service

          [Service]
          Type=simple
          User={{ app_user }}
          Group={{ app_group }}
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/java -jar {{ app_dir }}/app.jar
          Environment="SERVER_PORT={{ app_port }}"
          Environment="SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/{{ db_name }}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
          Environment="SPRING_DATASOURCE_USERNAME={{ db_user }}"
          Environment="SPRING_DATASOURCE_PASSWORD={{ db_password }}"
          Environment="SPRING_JPA_HIBERNATE_DDL_AUTO=update"
          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
      notify: Restart spring-boot

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start and enable Spring Boot service
      ansible.builtin.service:
        name: spring-boot
        state: started
        enabled: true

    - name: Wait for Spring Boot to listen on port 8080
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        timeout: 120

    #  Nginx reverse proxy 
    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart nginx

    - name: Configure nginx reverse proxy
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/spring-boot
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              location / {
                  proxy_pass         http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 60s;
                  proxy_read_timeout    60s;
              }
          }
      notify: Restart nginx

    - name: Enable nginx reverse proxy site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/spring-boot
        dest: /etc/nginx/sites-enabled/spring-boot
        state: link
      notify: Restart nginx

    - name: Start and enable nginx service
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    #  Final health check on instance 
    - name: Verify app responds locally via nginx on port 80
      ansible.builtin.uri:
        url: "http://127.0.0.1:80/"
        method: GET
        follow_redirects: safe
        status_code: [200, 201, 204, 301, 302, 307, 308, 404]
        timeout: 30
      register: health_check
      retries: 6
      delay: 15
      until: health_check.status in [200, 201, 204, 301, 302, 307, 308, 404]